<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Faculty Schedule System{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  {% block extra_head %}{% endblock %}
</head>
<body>
{% block navbar %}
<nav class="topbar">
  <div class="topbar-brand">
    <div class="logo-icon">FS</div>
    <span>Faculty Schedule</span>
  </div>
  {% if session.get('role') %}
  <div class="topbar-right">
    <div class="user-pill">
      <div class="avatar">{{ session.get('name','U')[0].upper() }}</div>
      <span>{{ session.get('name','') }}</span>
    </div>
    <a href="{{ url_for('logout') }}">
      <button class="btn-logout"><i class="fa fa-sign-out-alt"></i> Logout</button>
    </a>
  </div>
  {% endif %}
</nav>
{% endblock %}
{% block content %}{% endblock %}
<div class="toast" id="toast"></div>
<script>
function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+type;setTimeout(()=>t.className='toast',2800);}
</script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
