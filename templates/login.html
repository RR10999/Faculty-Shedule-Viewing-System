{% extends 'base.html' %}
{% block navbar %}{% endblock %}
{% block title %}Login – Faculty Schedule System{% endblock %}
{% block content %}
<div class="login-bg">
  <div class="login-card">
    <div class="login-logo"><i class="fa fa-arrow-right-to-bracket"></i></div>
    <h1 class="login-title">Faculty Schedule System</h1>
    <p class="login-sub">Sign in to continue</p>
    {% if error %}
    <div class="alert-error"><i class="fa fa-circle-exclamation"></i> {{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" name="email" placeholder="Enter your email" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" name="password" placeholder="Enter your password" required>
      </div>
      <div class="form-group">
        <label class="form-label">Role</label>
        <select class="form-select" name="role">
          <option value="student">Student</option>
          <option value="faculty">Faculty</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:.5rem">
        <i class="fa fa-arrow-right-to-bracket"></i> Login
      </button>
    </form>
  </div>
</div>
{% endblock %}
