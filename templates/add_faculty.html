{% extends 'base.html' %}
{% block title %}Add Faculty{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <h1>Add Faculty Member</h1>
    <div class="subtitle">Create a new faculty account</div>
  </div>
  <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary" style="background:rgba(255,255,255,.15);color:white;border:1px solid rgba(255,255,255,.3)">
    <i class="fa fa-arrow-left"></i> Back
  </a>
</div>
<div class="page-sm">
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input class="form-input" name="name" placeholder="e.g. Dr. Raman Kumar" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" name="email" placeholder="faculty@srm.edu.in" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" name="password" placeholder="Set initial password" required>
      </div>
      <div class="form-group">
        <label class="form-label">Designation</label>
        <select class="form-select" name="designation">
          <option value="Assistant Professor">Assistant Professor</option>
          <option value="Associate Professor">Associate Professor</option>
          <option value="Professor">Professor</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Department (Full Name)</label>
        <input class="form-input" name="department" placeholder="e.g. Network &amp; Communications">
      </div>
      <div class="form-group">
        <label class="form-label">Department Short Code</label>
        <select class="form-select" name="dept_short">
          <option value="CSE">CSE – Computer Science & Engineering</option>
          <option value="NWC">NWC – Network & Communications</option>
          <option value="CYS">CYS – Cyber Security</option>
          <option value="IT">IT – Information Technology</option>
          <option value="AIDS">AIDS – AI & Data Science</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Cabin Number</label>
        <input class="form-input" name="cabin" placeholder="e.g. TP - 204 or TP2 - 906 or UB - 107">
      </div>
      <div class="flex gap-3 mt-4">
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary" style="flex:1">Cancel</a>
        <button type="submit" class="btn btn-primary" style="flex:2">
          <i class="fa fa-plus"></i> Add Faculty
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
